<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Candi House Guardian - Eternal Policy Demo</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.3/dist/aframe-physics-system.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #ui {
      position: absolute; top: 15px; left: 15px; color: white; 
      background: rgba(0,0,0,0.85); padding: 18px; border-radius: 12px; 
      z-index: 100; width: 340px;
    }
    button {
      margin: 10px 0; padding: 14px 20px; font-size: 17px; 
      background: #e63939; color: white; border: none; border-radius: 10px; 
      cursor: pointer; width: 100%; font-weight: bold;
    }
    button:hover { background: #c1121f; }
    .status { margin-top: 10px; font-size: 14px; color: #ffff00; }
  </style>
</head>
<body>

  <a-scene physics="driver: ammo; debug: false;" background="color: #87CEEB">
    
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" color="#BBBBBB" intensity="0.7"></a-light>
    <a-light type="directional" position="5 15 10" intensity="1"></a-light>

    <!-- Lantai -->
    <a-plane static-body position="0 0 0" rotation="-90 0 0" width="25" height="25" color="#D2B48C"></a-plane>

    <!-- === RUMAH (Interior) === -->
    <!-- Dinding Utama -->
    <a-box id="house" static-body position="0 3.5 -8" width="14" height="7" depth="12" color="#E0C9A8"></a-box>
    
    <!-- Atap -->
    <a-cone static-body position="0 8 -8" radius-bottom="8" radius-top="0" height="4" color="#8B4513"></a-cone>

    <!-- Pintu -->
    <a-box position="-3 2 -2.5" width="2" height="3.5" depth="0.3" color="#4A2C0B"></a-box>
    
    <!-- Jendela -->
    <a-box position="4 3.5 -3" width="2.5" height="2.5" depth="0.3" color="#87CEEB"></a-box>
    <a-box position="-5 3.5 -8" width="2" height="2" depth="0.3" color="#87CEEB"></a-box>

    <!-- === FURNITURE BARU & LENGKAP === -->
    <!-- Meja Utama -->
    <a-box id="table" dynamic-body mass="8" position="1.5 1.2 -6" width="3.5" height="0.15" depth="2" color="#A0522D"></a-box>
    
    <!-- Kursi 1 & 2 -->
    <a-box id="chair1" dynamic-body mass="3" position="0 1 -5" width="0.8" height="1" depth="0.8" color="#8B5A2B"></a-box>
    <a-box id="chair2" dynamic-body mass="3" position="3 1 -6.5" width="0.8" height="1" depth="0.8" color="#8B5A2B"></a-box>
    
    <!-- Meja Kecil Tambahan -->
    <a-box id="smalltable" dynamic-body mass="4" position="-3 1.2 -9" width="1.5" height="0.15" depth="1.5" color="#A0522D"></a-box>
    
    <!-- Lampu Gantung -->
    <a-entity position="0 6 -6" rotation="0 0 0">
      <a-cylinder static-body height="1.5" radius="0.1" color="#333333"></a-cylinder>
      <a-sphere dynamic-body mass="1" position="0 -1.2 0" radius="0.6" color="#FFD700"></a-sphere>
    </a-entity>

    <!-- Lemari -->
    <a-box id="cabinet" dynamic-body mass="15" position="-5.5 2.5 -11" width="1.8" height="4" depth="1.2" color="#6B4E31"></a-box>

    <!-- Kamera DI DALAM RUMAH -->
    <a-camera position="2 2 -3" rotation="0 40 0" wasd-controls look-controls></a-camera>

    <a-entity position="0 10 -15" text="value: 🏠 Candi House Guardian\nEternal Policy Demo; align: center; color: #ffffff; width: 12;"></a-entity>
  </a-scene>

  <!-- UI -->
  <div id="ui">
    <h2>🏠 Candi Eternal Policy</h2>
    <p><strong>Demo Rumah Simulator (Hari 3 - Di Dalam Rumah)</strong></p>
    <button onclick="simulateEarthquake()">🔄 Simulasi Gempa</button>
    <button onclick="simulateFire()">🔥 Simulasi Kebakaran</button>
    <button onclick="resetScene()">🔄 Reset Rumah</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');

    function simulateEarthquake() {
      statusEl.textContent = "🔄 Gempa sedang terjadi...";

      const house = document.getElementById('house');
      const table = document.getElementById('table');
      const chair1 = document.getElementById('chair1');
      const chair2 = document.getElementById('chair2');
      const smalltable = document.getElementById('smalltable');
      const cabinet = document.getElementById('cabinet');
      const lamp = document.querySelector('a-sphere[dynamic-body]');

      // Goyang rumah
      house.setAttribute('animation', {
        property: 'rotation',
        to: '6 10 8',
        dur: 180,
        loop: true,
        dir: 'alternate',
        easing: 'easeInOutSine'
      });

      // Dorongan kuat ke semua furniture
      setTimeout(() => {
        if (table.body) table.body.applyImpulse(new Ammo.btVector3(3, 28, 6), new Ammo.btVector3(0,0,0));
        if (chair1.body) chair1.body.applyImpulse(new Ammo.btVector3(-7, 20, 8), new Ammo.btVector3(0,0,0));
        if (chair2.body) chair2.body.applyImpulse(new Ammo.btVector3(9, 25, -5), new Ammo.btVector3(0,0,0));
        if (smalltable.body) smalltable.body.applyImpulse(new Ammo.btVector3(-4, 18, 3), new Ammo.btVector3(0,0,0));
        if (cabinet.body) cabinet.body.applyImpulse(new Ammo.btVector3(-5, 35, 10), new Ammo.btVector3(0,0,0));
        if (lamp && lamp.body) lamp.body.applyImpulse(new Ammo.btVector3(2, 15, -4), new Ammo.btVector3(0,0,0));
      }, 100);

      setTimeout(() => {
        house.removeAttribute('animation');
        statusEl.textContent = "✅ Simulasi Gempa selesai";
        setTimeout(() => statusEl.textContent = "", 3000);
      }, 7000);
    }

    function simulateFire() {
      statusEl.textContent = "🔥 Simulasi Kebakaran masih dalam pengembangan";
      setTimeout(() => statusEl.textContent = "", 3000);
    }

    function resetScene() {
      location.reload();
    }
  </script>

</body>
</html>
