<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Candi House Guardian - Eternal Policy Demo</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.3/dist/aframe-physics-system.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #ui {
      position: absolute; top: 15px; left: 15px; color: white; 
      background: rgba(0,0,0,0.75); padding: 15px; border-radius: 12px; 
      z-index: 100; width: 320px;
    }
    button {
      margin: 10px 0; padding: 14px 20px; font-size: 17px; 
      background: #e63939; color: white; border: none; border-radius: 10px; 
      cursor: pointer; width: 100%; font-weight: bold;
    }
    button:hover { background: #c1121f; }
  </style>
</head>
<body>

  <a-scene physics="driver: ammo; debug: false;" background="color: #87CEEB">
    
    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Lighting -->
    <a-light type="ambient" color="#BBBBBB" intensity="0.8"></a-light>
    <a-light type="directional" position="5 15 10" intensity="1" cast-shadow="true"></a-light>

    <!-- Lantai Rumah -->
    <a-plane static-body position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#555555"></a-plane>

    <!-- === RUMAH PRIMITIVE (Hari 2) === -->
    
    <!-- Dinding Utama -->
    <a-box static-body position="0 3 -8" width="12" height="6" depth="10" color="#E0C9A8"></a-box>
    
    <!-- Atap -->
    <a-cone static-body position="0 7 -8" radius-bottom="7" radius-top="0" height="3" color="#8B4513"></a-cone>
    
    <!-- Pintu -->
    <a-box position="-2 2 -3" width="1.5" height="3" depth="0.2" color="#4A2C0B"></a-box>
    
    <!-- Jendela 1 -->
    <a-box position="3 3 -3" width="2" height="2" depth="0.2" color="#87CEEB"></a-box>
    <!-- Jendela 2 -->
    <a-box position="-4 3 -8" width="2" height="2" depth="0.2" color="#87CEEB"></a-box>

    <!-- Furniture Sederhana (bisa jatuh saat gempa) -->
    <!-- Meja -->
    <a-box dynamic-body position="2 1.5 -6" width="3" height="0.1" depth="2" color="#A0522D"></a-box>
    <!-- Kursi 1 -->
    <a-box dynamic-body position="1 1 -5" width="0.8" height="1" depth="0.8" color="#8B5A2B"></a-box>
    <!-- Kursi 2 -->
    <a-box dynamic-body position="3 1 -7" width="0.8" height="1" depth="0.8" color="#8B5A2B"></a-box>
    <!-- Lemari -->
    <a-box static-body position="-5 2.5 -10" width="1.5" height="4" depth="1" color="#6B4E31"></a-box>

    <!-- Teks Judul di Langit -->
    <a-entity position="0 8 -12" text="value: 🏠 Candi House Guardian\nEternal Policy Demo; align: center; color: #ffffff; width: 10;"></a-entity>

  </a-scene>

  <!-- UI Panel -->
  <div id="ui">
    <h2>🏠 Candi Eternal Policy</h2>
    <p><strong>Demo Rumah Simulator (Hari 2)</strong></p>
    <button onclick="simulateEarthquake()">🔄 Simulasi Gempa</button>
    <button onclick="simulateFire()">🔥 Simulasi Kebakaran</button>
    <button onclick="resetScene()">🔄 Reset Rumah</button>
  </div>

  <script>
    function simulateEarthquake() {
      alert("🔄 Simulasi Gempa sedang dijalankan...\n\n(Rumah akan bergoyang + furniture jatuh di versi berikutnya)");
      // Kita akan aktifkan physics goyang besok (Hari 3)
    }

    function simulateFire() {
      alert("🔥 Simulasi Kebakaran sedang dijalankan...\n\n(Efek api akan ditambahkan di versi berikutnya)");
    }

    function resetScene() {
      alert("Rumah telah di-reset ke kondisi awal.");
      location.reload(); // sementara pakai reload
    }
  </script>

</body>
</html>
